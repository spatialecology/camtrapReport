name: Bug report
description: Report an error or unexpected behavior in camtrapReport
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem in camtrapReport.

        Please fill in the fields below so we can reproduce the issue.
        For usage questions, use the support route instead of this bug form.

  - type: input
    id: package_version
    attributes:
      label: camtrapReport version
      description: What package version are you using?
      placeholder: "e.g. 0.2-16"
    validations:
      required: true

  - type: dropdown
    id: install_source
    attributes:
      label: Installation source
      description: How did you install camtrapReport?
      options:
        - GitHub main
        - Local source
        - Other
    validations:
      required: true

  - type: input
    id: r_version
    attributes:
      label: R version
      placeholder: "e.g. R 4.4.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11 / macOS 15 / Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the problem clearly.
      placeholder: Tell us what you did and what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe the expected result.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give a short numbered sequence.
      placeholder: |
        1. Load data with ...
        2. Run ...
        3. Error appears
    validations:
      required: true

  - type: textarea
    id: error_message
    attributes:
      label: Full error message / traceback
      description: Paste the complete error text if available.
      render: text

  - type: textarea
    id: reprex
    attributes:
      label: Minimal reproducible example
      description: Paste the smallest code example that reproduces the issue.
      render: r

  - type: textarea
    id: session_info
    attributes:
      label: Session info
      description: Paste the output of sessionInfo()
      render: text

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues first
          required: true
        - label: I can reproduce this issue consistently
          required: false
        - label: I included a minimal example or enough detail to diagnose the problem
          required: true