---
name: "spat_density"
title: "## Spatial Density"
parent: "results"
text: "Spatial density maps derived from point pattern analysis illustrate the spatial distribution of species detections across the study area. These visualizations highlight variation in detection intensity and help identify areas with relatively high or low concentrations of records. The following maps are presented for each species, either by survey year or across the full monitoring period. Warmer colors represent higher estimated detection density, whereas cooler colors indicate lower density. Together, these maps support comparison of spatial detection patterns among species and across survey years."
code: |
  #| name: code
  #| setting: echo=FALSE,results="asis",warning=FALSE,message=FALSE
  #| packages: leaflet, terra
  
  
  .spn <- object$get_speciesNames(object$setting$focus_groups)

  df <- object$species_summary_by_location(year = NULL,spList = .spn,cor_matrix = FALSE)
  df$lon <- df$longitude
  df$lat <- df$latitude
  
  .dfs <- vect(df,geom=c('lon','lat'),crs=crs(rast()))
  .dfs <- .get_projected_vect(.dfs)
  .crs <- crs(.dfs)
  .dfs <- as.data.frame(.dfs,geom="XY")
  
  if (!is.null(object$study_area) && !is.null(object$study_area$path)) {
    object$study_area$object <- terra::readRDS(object$study_area$path)
    .crop <- project(object$study_area$object,.crs)
    .ext <- as.vector(ext(.crop))
  } else {
    .ext <- NULL
    .crop <- NULL
  }
  #------
  .generate_density_maps <- function(.year=NULL,.ext=.ext,.crop=.crop) {
    df <- object$species_summary_by_location(year = .year,spList = .spn,cor_matrix = FALSE)
    df$lon <- df$longitude
    df$lat <- df$latitude
    if (is.null(df)) return(NULL)
    .dfs <- vect(df,geom=c('lon','lat'),crs=crs(rast()))
    .dfs <- .get_projected_vect(.dfs)
    .crs <- crs(.dfs)
    .dfs <- as.data.frame(.dfs,geom="XY")
    #species_list <- unique(.dfs$scientificName)
    #---
    .w <- table(.dfs$scientificName)
    .w <- .w[.w > 3]
    if (length(.w) > 0) {
      species_list <- names(.w)
      .label <- 'Total'
      if (!is.null(.year)) .label <- as.character(.year)
      
      cat("\n###", .label, "{.tabset .unnumbered}\n\n")
      
      for (sp in species_list) {
        df_sp <- .dfs |> dplyr::filter(scientificName == sp)
        #if (nrow(df_sp) < 3) next
        
        r <- try(object$spatial_density(df_sp,.crs=.crs,.ext=.ext,.crop=.crop),silent = TRUE)
        if (inherits(r,'try-error')) r <- NULL
        if (is.null(r)) next
        
        cat("\n####", sp, "{.unnumbered}\n\n")
        m <- leaflet(df_sp) |>
          addTiles(group = "OSM") |>
          addRasterImage(
            r, opacity = 0.7,
            colors = colorRampPalette(c("gray","orange","red","darkred"))(200),
            group = "Density"
          )
        if ("Habitat_type" %in% colnames(df_sp)) {
          m <- m |>
            addCircleMarkers(
              ~longitude, ~latitude,
              popup = ~sprintf(
                "<b>%s</b><br/>%s<br/>Obs: %d<br/>Habitat: %s",
                scientificName, locationName, total_observations, Habitat_type
              ),
              radius = ~sqrt(total_observations)*1.2,
              color  = "blue", fillOpacity = 0.4,
              group  = "Points"
            )
        } else {
          m <- m |>
            addCircleMarkers(
              ~longitude, ~latitude,
              popup = ~sprintf(
                "<b>%s</b><br/>%s<br/>Obs: %d",
                scientificName, locationName, total_observations
              ),
              radius = ~sqrt(total_observations)*1.2,
              color  = "blue", fillOpacity = 0.4,
              group  = "Points"
            )
        }
      if (!is.null(.crop)) {
      m <- m |>
      addPolygons(
      data = project(.crop, "epsg:4326"),
      fillColor = "transparent",
      fillOpacity = 0.3,
      color = "black",
      weight = 2,
      options = pathOptions(interactive = FALSE)
          )
        }
        
        #----
        m <- m |>
          addLayersControl(
            baseGroups    = "OSM",
            overlayGroups = c("Density","Points"),
            options = layersControlOptions(collapsed = FALSE)
          ) |>
          setView(
            lng = mean(df_sp$longitude, na.rm = TRUE),
            lat = mean(df_sp$latitude,  na.rm = TRUE),
            zoom = 11
          )
        print(tagList(m))
      }
    }
  
  }
    
    
  cat("\n##  {.tabset .unnumbered}\n\n")
  
  .w <- leaflet()
  
  for (.year in object$years) {
    .generate_density_maps(.year,.ext,.crop)
  }
  #---
  .generate_density_maps(.year=NULL,.ext,.crop)
  #----
  cat("\n\n")
  
  #---------
  if (!is.null(object$setting$focus_groups) && is.character(object$setting$focus_groups) && length(object$setting$focus_groups) > 0) {
    cat(paste0("## {.unnumbered}\n",object$getFigureNumber()," *Spatial point pattern analysis based on the species focus group: ",.paste_comma_and(object$setting$focus_groups),", for each survey year, as well as the cumulative (Total) across all years.*\n"))
  } else cat(object$getFigureNumber()," *Spatial point pattern analysis for each year separately as well as  the cumulative (Total) across all years.*\n")
    
---