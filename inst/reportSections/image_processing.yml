text: |
  
  To manage the large volumes of images and videos generated by camera trapping, and to support standardized, reproducible, and interoperable workflows, camera-trap data are increasingly managed using dedicated platforms such as [Agouti](https://agouti.eu/) (Casaer et al., 2019) and [TRAPPER](https://trapper-project.readthedocs.io/en/latest/overview.html), and structured according to community data standards such as [Camtrap-DP](https://camtrap-dp.tdwg.org/) (Bubnicki et al., 2024).

  Agouti is an online platform that supports the organization of camera-trap surveys, media upload, sequence-based annotation, artificial-intelligence-assisted classification, secure archiving, and standardized data export. Within this workflow, images recorded within 120 seconds of one another can be grouped into sequences representing putative single events and annotated using a combination of AI-assisted classification and manual review by annotators, with a subset subsequently validated by experienced observers. Where required for density estimation, calibration images and species-specific movement paths can also be annotated for downstream photogrammetric analyses using the R package [camtrapDensity](https://github.com/MarcusRowcliffe/camtrapDensity).

  TRAPPER is an open-source, web-based platform designed for camera-trapping project management. It supports the ingestion, organization, annotation, and storage of image and video data, and can integrate AI-based workflows for object detection and species classification. The platform also supports automatic sequence building and standardized export in [Camtrap-DP](https://camtrap-dp.tdwg.org/) format, thereby facilitating interoperable downstream analyses and integration with external tools and workflows.

  In this study, image data were processed and archived in **`r paste(purrr::map_chr(cm$info$json$sources, "title"), collapse = ", ")`**.
  
