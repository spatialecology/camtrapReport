---
name: "model_parameters"
title: "### REM Model Parameters {.tabset}"
parent: "population_density"
text: "The REM relies on three key parameters: movement speed, activity level, and day range. Movement speed represents the average distance traveled by an individual over time, whereas activity level reflects the proportion of time individuals are active and therefore available for detection by camera traps. Day range refers to the total distance an animal typically moves within a 24-hour period and is derived from movement speed and activity level (*Rowcliffe et al., 2008; Rowcliffe et al., 2016*). Together, these parameters underpin the REM density estimates presented in this section. The tabs below show species-specific estimates for each parameter.\n\n"
code: |
  #| name: REM_parameters 
  #| setting: echo=FALSE, results="asis", warning=FALSE, message=FALSE
  #| packages: ggplot2, dplyr
  
  # REM estimates

  if (!exists("estimates_rem") || !is.data.frame(estimates_rem)) {
    
    spn <- object$get_speciesNames(object$setting$focus_groups)
    spn <- unique(as.character(spn))
    spn <- spn[!is.na(spn) & nzchar(spn)]
    
    rem_list <- list()
    
    if (length(spn) > 0) {
      for (sp in spn) {
        tmp <- try(object$get_REM(sp), silent = TRUE)
        
        if (!inherits(tmp, "try-error") && !is.null(tmp) && length(tmp) > 0) {
          tmp_df <- try(dplyr::bind_rows(tmp), silent = TRUE)
          
          if (!inherits(tmp_df, "try-error") && is.data.frame(tmp_df) && nrow(tmp_df) > 0) {
            rem_list[[sp]] <- tmp_df
          }
        }
      }
    }
    
    estimates_rem <- dplyr::bind_rows(rem_list)
  }
  
  # 
  # Helper

  
  .make_species_colors <- function(species) {
    
    species <- unique(as.character(species))
    species <- species[!is.na(species) & nzchar(species)]
    n <- length(species)
    
    if (n == 0) {
      return(stats::setNames(character(0), character(0)))
    }
    
    base_cols <- object$reportObjectElements$color_palette
    
    if (!is.null(base_cols) && length(base_cols) >= n) {
      cols <- base_cols[seq_len(n)]
    } else {
      cols <- grDevices::hcl.colors(n, palette = "Dark 3")
    }
    
    stats::setNames(cols, species)
  }
  
  .prepare_parameter_data <- function(data, metric_name, lower_bound = 0, upper_bound = NULL) {
    
    out <- data |>
      dplyr::filter(.data$Metric == metric_name) |>
      dplyr::mutate(
        Year_numeric = suppressWarnings(as.numeric(as.character(.data$Year))),
        estimate = suppressWarnings(as.numeric(.data$estimate)),
        lcl95 = suppressWarnings(as.numeric(.data$lcl95)),
        ucl95 = suppressWarnings(as.numeric(.data$ucl95))
      ) |>
      dplyr::filter(
        !is.na(.data$scientificName),
        nzchar(as.character(.data$scientificName)),
        !is.na(.data$Year_numeric),
        is.finite(.data$estimate)
      ) |>
      dplyr::group_by(.data$scientificName) |>
      dplyr::slice_min(order_by = .data$Year_numeric, n = 1, with_ties = FALSE) |>
      dplyr::ungroup()
    
    if (nrow(out) == 0) {
      return(out)
    }
    
    # Keep estimates and confidence intervals inside biologically valid bounds.
    out$estimate_plot <- pmax(lower_bound, out$estimate)
    out$lcl95_plot <- ifelse(is.finite(out$lcl95), pmax(lower_bound, out$lcl95), NA_real_)
    out$ucl95_plot <- ifelse(is.finite(out$ucl95), out$ucl95, NA_real_)
    
    if (!is.null(upper_bound)) {
      out$estimate_plot <- pmin(upper_bound, out$estimate_plot)
      out$ucl95_plot <- pmin(upper_bound, out$ucl95_plot)
    }
    
    out
  }
  
  .plot_parameter <- function(data, y_label, caption_text, upper_bound = NULL) {
    
    if (nrow(data) == 0) {
      cat("\n\nNo data are available for this REM parameter.\n\n")
      return(invisible(NULL))
    }
    
    unique_species <- unique(data$scientificName)
    species_colors <- .make_species_colors(unique_species)
    
    p <- ggplot2::ggplot(
      data,
      ggplot2::aes(
        x = .data$scientificName,
        y = .data$estimate_plot,
        fill = .data$scientificName
      )
    ) +
      ggplot2::geom_col() +
      ggplot2::geom_errorbar(
        ggplot2::aes(
          ymin = .data$lcl95_plot,
          ymax = .data$ucl95_plot
        ),
        width = 0.2,
        na.rm = TRUE
      ) +
      ggplot2::labs(
        x = "Species",
        y = y_label
      ) +
      ggplot2::scale_fill_manual(values = species_colors) +
      ggplot2::theme_minimal(base_size = 13) +
      ggplot2::theme(
        axis.text.x = ggplot2::element_text(angle = 45, hjust = 1),
        axis.title.x = ggplot2::element_text(face = "bold", color = "black"),
        axis.title.y = ggplot2::element_text(face = "bold", color = "black"),
        plot.title = ggplot2::element_text(face = "bold"),
        legend.position = "none"
      )
    
    if (is.null(upper_bound)) {
      p <- p +
        ggplot2::scale_y_continuous(
          limits = c(0, NA),
          expand = ggplot2::expansion(mult = c(0, 0.05))
        )
    } else {
      p <- p +
        ggplot2::scale_y_continuous(
          limits = c(0, upper_bound),
          expand = ggplot2::expansion(mult = c(0, 0.05))
        )
    }
    
    print(p)
    
    cat("\n\n", object$getFigureNumber(), " *", caption_text, "*\n")
  }
  
  # Plot REM model

  if (nrow(estimates_rem) > 0) {
    
    cat('\n#### Movement Speed {.tabset .unnumbered}\n\n')
    
    active_speed_data <- .prepare_parameter_data(
      estimates_rem,
      metric_name = "active_speed",
      lower_bound = 0
    )
    
    .plot_parameter(
      active_speed_data,
      y_label = "Active speed (km/h)",
      caption_text = "Estimated active movement speeds (km/h) across study species. Error bars show 95% confidence intervals truncated at zero because movement speed cannot be negative."
    )
    
    cat('\n#### Activity Level {.tabset .unnumbered}\n\n')
    
    activity_data <- .prepare_parameter_data(
      estimates_rem,
      metric_name = "activity_level",
      lower_bound = 0,
      upper_bound = 1
    )
    
    .plot_parameter(
      activity_data,
      y_label = "Proportion of Time Active",
      caption_text = "Estimated activity levels, expressed as the proportion of the day active, for each study species. Whiskers represent 95% confidence intervals constrained to the biologically valid range from 0 to 1.",
      upper_bound = 1
    )
    
    cat('\n#### Day range {.tabset .unnumbered}\n\n')
    
    overall_speed_data <- .prepare_parameter_data(
      estimates_rem,
      metric_name = "overall_speed",
      lower_bound = 0
    )
    
    .plot_parameter(
      overall_speed_data,
      y_label = "Day Range (km)",
      caption_text = "Estimated day ranges for each study species, calculated as the product of movement speed and activity level scaled to a 24-hour period. Whiskers indicate 95% confidence intervals truncated at zero because day range cannot be negative."
    )
    
  } else {
    
    cat("\n\nREM model parameters are not available for the selected species.\n\n")
  }
