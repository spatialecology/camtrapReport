---
name: "model_parameters"
title: "### REM Model Parameters {.tabset}"
parent: "population_density"
text: |
  The Random Encounter Model (REM) relies on key parameters describing animal movement and detectability. Movement speed represents the average distance travelled by an individual while active, activity level reflects the proportion of time individuals are active and therefore available for detection by camera traps, and day range represents the estimated distance moved over a 24-hour period. Together, these parameters underpin the REM density estimates presented in this section. The tabs below show species-specific estimates for each parameter.

code: |
  #| name: REM_parameters
  #| setting: echo=FALSE, results="asis", warning=FALSE, message=FALSE, fig.width=11, fig.height=6.5, out.width="100%", fig.align="center", dpi=150
  #| packages: ggplot2, dplyr

  # ------------------------------------------------------------
  # Collect REM estimates
  # ------------------------------------------------------------

  .collect_rem_estimates <- function(object) {

    rem_list <- list()

    # 1. First use stored REM results, if available
    if (!is.null(object$rem) && length(object$rem) > 0) {

      stored_rem <- unlist(object$rem, recursive = FALSE)

      if (length(stored_rem) > 0) {

        stored_df <- try(
          dplyr::bind_rows(stored_rem),
          silent = TRUE
        )

        if (!inherits(stored_df, "try-error") &&
            is.data.frame(stored_df) &&
            nrow(stored_df) > 0) {
          return(stored_df)
        }
      }
    }

    # 2. Otherwise try fitting/extracting REM species by species
    spn <- try(
      object$get_speciesNames(object$setting$focus_groups),
      silent = TRUE
    )

    if (inherits(spn, "try-error") || length(spn) == 0) {
      cat("\n\nNo species were found for the selected focus group.\n\n")
      return(data.frame())
    }

    spn <- unique(as.character(spn))
    spn <- spn[!is.na(spn) & nzchar(spn)]

    if (length(spn) == 0) {
      cat("\n\nNo valid species names were found for the selected focus group.\n\n")
      return(data.frame())
    }

    for (sp in spn) {

      tmp <- tryCatch(
        object$get_REM(sp),
        error = function(e) {
          cat(
            "\n\nREM failed for **", sp, "**: ",
            conditionMessage(e),
            "\n\n",
            sep = ""
          )
          NULL
        }
      )

      if (!is.null(tmp) && length(tmp) > 0) {

        tmp_df <- tryCatch(
          dplyr::bind_rows(tmp),
          error = function(e) {
            cat(
              "\n\nREM result could not be combined for **", sp, "**: ",
              conditionMessage(e),
              "\n\n",
              sep = ""
            )
            NULL
          }
        )

        if (is.data.frame(tmp_df) && nrow(tmp_df) > 0) {
          rem_list[[sp]] <- tmp_df
        }
      }
    }

    estimates_rem <- dplyr::bind_rows(rem_list)

    if (!is.data.frame(estimates_rem) || nrow(estimates_rem) == 0) {

      cat("\n\nREM estimates could not be generated for the selected species.\n\n")

      if (!is.null(object$.tempObjects$rem_errors) &&
          length(object$.tempObjects$rem_errors) > 0) {

        cat("\n\n**REM diagnostic messages:**\n\n")

        for (sp in names(object$.tempObjects$rem_errors)) {
          cat(
            "- **", sp, "**: ",
            paste(object$.tempObjects$rem_errors[[sp]], collapse = "; "),
            "\n",
            sep = ""
          )
        }

        cat("\n")
      }
    }

    estimates_rem
  }

  estimates_rem <- .collect_rem_estimates(object)

  # ------------------------------------------------------------
  # Helper functions
  # ------------------------------------------------------------

  .make_species_colors <- function(species) {

    species <- unique(as.character(species))
    species <- species[!is.na(species) & nzchar(species)]

    n <- length(species)

    if (n == 0) {
      return(stats::setNames(character(0), character(0)))
    }

    base_cols <- object$reportObjectElements$color_palette

    if (!is.null(base_cols) && length(base_cols) >= n) {
      cols <- base_cols[seq_len(n)]
    } else {
      cols <- grDevices::hcl.colors(n, palette = "Dark 3")
    }

    stats::setNames(cols, species)
  }

  .caption_html <- function(fig_no, text) {
    cat(paste0(
      '\n\n<p style="font-size:16px; color:black; font-weight:normal; margin-top:10px;">',
      '<b>Figure ', fig_no, '.</b> ',
      '<i>', text, '</i>',
      '</p>\n\n'
    ))
  }

  .prepare_parameter_data <- function(data,
                                      metric_name,
                                      lower_bound = 0,
                                      upper_bound = NULL) {

    if (!is.data.frame(data) ||
        nrow(data) == 0 ||
        !"Metric" %in% names(data)) {
      return(data.frame())
    }

    out <- data |>
      dplyr::filter(.data$Metric == metric_name) |>
      dplyr::mutate(
        Year_chr = as.character(.data$Year),
        Year_numeric = suppressWarnings(as.numeric(.data$Year_chr)),
        estimate = suppressWarnings(as.numeric(.data$estimate)),
        lcl95 = suppressWarnings(as.numeric(.data$lcl95)),
        ucl95 = suppressWarnings(as.numeric(.data$ucl95)),
        is_all_years = .data$Year_chr == "9999"
      ) |>
      dplyr::filter(
        !is.na(.data$scientificName),
        nzchar(as.character(.data$scientificName)),
        !is.na(.data$Year_numeric),
        is.finite(.data$estimate)
      ) |>
      dplyr::group_by(.data$scientificName) |>
      dplyr::arrange(
        dplyr::desc(.data$is_all_years),
        .data$Year_numeric,
        .by_group = TRUE
      ) |>
      dplyr::slice(1) |>
      dplyr::ungroup()

    if (nrow(out) == 0) {
      return(out)
    }

    out$estimate_plot <- pmax(lower_bound, out$estimate)

    out$lcl95_plot <- ifelse(
      is.finite(out$lcl95),
      pmax(lower_bound, out$lcl95),
      NA_real_
    )

    out$ucl95_plot <- ifelse(
      is.finite(out$ucl95),
      out$ucl95,
      NA_real_
    )

    if (!is.null(upper_bound)) {

      out$estimate_plot <- pmin(upper_bound, out$estimate_plot)

      out$ucl95_plot <- ifelse(
        is.finite(out$ucl95_plot),
        pmin(upper_bound, out$ucl95_plot),
        NA_real_
      )
    }

    out |>
      dplyr::arrange(.data$scientificName)
  }

  .plot_parameter <- function(data,
                              y_label,
                              caption_text,
                              upper_bound = NULL) {

    if (!is.data.frame(data) || nrow(data) == 0) {
      cat("\n\nNo data are available for this REM parameter.\n\n")
      return(invisible(NULL))
    }

    data$scientificName <- factor(
      data$scientificName,
      levels = data$scientificName
    )

    species_colors <- .make_species_colors(data$scientificName)

    p <- ggplot2::ggplot(
      data,
      ggplot2::aes(
        x = .data$scientificName,
        y = .data$estimate_plot,
        fill = .data$scientificName
      )
    ) +
      ggplot2::geom_col(width = 0.75) +
      ggplot2::geom_errorbar(
        ggplot2::aes(
          ymin = .data$lcl95_plot,
          ymax = .data$ucl95_plot
        ),
        width = 0.2,
        linewidth = 0.6,
        na.rm = TRUE
      ) +
      ggplot2::labs(
        x = "Species",
        y = y_label
      ) +
      ggplot2::scale_fill_manual(values = species_colors) +
      ggplot2::theme_minimal(base_size = 13) +
      ggplot2::theme(
        axis.text.x = ggplot2::element_text(angle = 45, hjust = 1),
        axis.title.x = ggplot2::element_text(face = "bold", color = "black"),
        axis.title.y = ggplot2::element_text(face = "bold", color = "black"),
        legend.position = "none",
        panel.grid.minor = ggplot2::element_blank()
      )

    if (is.null(upper_bound)) {

      p <- p +
        ggplot2::scale_y_continuous(
          limits = c(0, NA),
          expand = ggplot2::expansion(mult = c(0, 0.05))
        )

    } else {

      p <- p +
        ggplot2::scale_y_continuous(
          limits = c(0, upper_bound),
          expand = ggplot2::expansion(mult = c(0, 0.05))
        )
    }

    print(p)

    .caption_html(
      object$getFigureNumber(text = FALSE),
      caption_text
    )

    invisible(NULL)
  }

  # ------------------------------------------------------------
  # Plot REM model parameters
  # ------------------------------------------------------------

  if (is.data.frame(estimates_rem) && nrow(estimates_rem) > 0) {

    cat('\n#### Movement Speed {.unnumbered}\n\n')

    active_speed_data <- .prepare_parameter_data(
      estimates_rem,
      metric_name = "active_speed",
      lower_bound = 0
    )

    .plot_parameter(
      active_speed_data,
      y_label = "Active speed (km/h)",
      caption_text = "Estimated active movement speeds across study species. Error bars show 95% confidence intervals."
    )

    cat('\n#### Activity Level {.unnumbered}\n\n')

    activity_data <- .prepare_parameter_data(
      estimates_rem,
      metric_name = "activity_level",
      lower_bound = 0,
      upper_bound = 1
    )

    .plot_parameter(
      activity_data,
      y_label = "Proportion of time active",
      caption_text = "Estimated activity levels, expressed as the proportion of the day active, for each study species. Error bars show 95% confidence intervals.",
      upper_bound = 1
    )

    cat('\n#### Day Range {.unnumbered}\n\n')

    overall_speed_data <- .prepare_parameter_data(
      estimates_rem,
      metric_name = "overall_speed",
      lower_bound = 0
    )

    .plot_parameter(
      overall_speed_data,
      y_label = "Day range (km/day)",
      caption_text = "Estimated day ranges for each study species, calculated from movement speed and activity level. Error bars show 95% confidence intervals."
    )

  } else {

    cat("\n\nREM model parameters are not available for the selected species.\n\n")
  }
