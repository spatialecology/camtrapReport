text: |
  Mammals play vital roles in terrestrial ecosystems. Ungulates and carnivores in particular influence vegetation through herbivory and predation, contribute to nutrient cycling, energy flows, and seed dispersal, and act as ecosystem engineers through trampling, digging, and rooting (*Augustine & McNaughton 1998; Lacher et al., 2019*). Mammals are also central to public nature experiences and conservation goals. However, they often come into conflict with humans, causing crop damage, traffic collisions, and disease spread, prompting population control measures (*Torres et al., 2018*). Understanding their distribution, abundance and behavior is therefore crucial for protected area management.
  Camera trapping has become an affordable, reliable, and non-invasive method for monitoring mammal populations in protected areas (*Kays et al., 2009*). It provides insights into habitat use and activity patterns by capturing images or videos when warm-bodied animals trigger infrared sensors, day and night, with minimal disturbance. Scientists use these data to analyze species distribution, activity, and abundance, supporting population monitoring and ecological research.
  The [European Observatory of Wildlife (EOW)](https://wildlifeobservatory.org) is a standardized camera-trapping network across [73 European protected areas](https://eow.wildlifeobservatory.org/), organized by the [ENETWILD consortium](https://enetwild.com/) and funded by the[European Food Safety Authority (EFSA)](https://www.efsa.europa.eu/en). Images are processed and archived on [Agouti](https://www.agouti.eu), with annual reports submitted to EFSA.
  A unique feature of the EOW protocol is its ability to estimate population density using the [Random Encounter Model (REM)] (https://github.com/MarcusRowcliffe/camtrapDensity) (*Rowcliffe et al., 2008*). The REM is based on the assumption that animals move randomly in relation to camera placements, and that the total number of detections across locations is proportional to the population density. In other words, more captures indicate a larger number of individuals in the population. This model allows for the estimation of animal population density without the need for individual identification by correcting capture rates for species-specific differences in detectability, which may additionally vary by habitat. Detectability itself depends on two factors: (1) the effective size of the wedge-shaped area over which the camera's sensor detects passing animals, and (2) the average daily distance travelled by the species. The average daily distance travelled is in turn a product of two factors: the daily activity level, which refers to the average number of hours per day that the species spends moving, and the movement speed. The daily activity level can be calculated from the frequency distribution of captures across the 24-hour day (*Rowcliffe et al., 2014*). The detection area and movement speed can be estimated from movement paths of animals captured by the cameras (*Rowcliffe et al., 2011*).
  Here, we report on camera-trap surveys in {siteName} as part of EOW. The goal was to estimate and monitor ungulate and carnivore populations over time and across sites, providing data on species distribution and activity patterns.
  
  
