text: |

  Terrestrial wildlife populations are fundamental to ecosystem structure and function. Wildlife across taxonomic groups contributes to key ecological processes such as nutrient cycling, energy flow, seed dispersal, trophic interactions, and habitat modification, thereby supporting biodiversity and ecosystem resilience (Dirzo et al., 2014). At the same time, wildlife populations are increasingly affected by anthropogenic pressures, especially habitat alteration and land-use change, which may influence their distribution and abundance across space and time (Newbold et al., 2015). Quantifying these responses is therefore crucial for effective protected-area management and evidence-based conservation (Coad et al., 2015).

  Camera trapping has become a cost-effective, reliable, and non-invasive method for monitoring wildlife populations (Burton et al., 2015). Through the automatic capture of images or videos triggered by animal movement within the detection zone of infrared sensors, camera traps provide robust information on species occurrence, habitat use, activity patterns, and relative abundance while minimizing observer-related disturbance. Consequently, camera-trap data have become an important source of biodiversity information and are widely used in ecological research, biodiversity monitoring, and adaptive conservation management.

  The aim of this study is to estimate and monitor {cm$setting$focus_groups} over time and across deployments at {siteName}, and to improve understanding of their spatiotemporal dynamics.
  
