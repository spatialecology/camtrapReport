---
name: "activity_patterns"
title: "## Activity Patterns {.tabset}"
parent: "results"
text: "Activity patterns describe the temporal distribution of animal activity across the 24-hour day and are typically inferred from the timing of camera-trap detections. These patterns help identify whether species are primarily diurnal, nocturnal, or crepuscular, and can provide insight into daily behavior, ecological roles, and potential responses to environmental factors or human disturbance. The figures below present estimated daily activity curves for each study species, based on camera-trap detections collected across the monitoring period and derived using functionality from the [activity](https://cran.r-project.org/package=activity) R package (*Rowcliffe, 2016*)."
code: |
  #| name: activity_pattern
  #| setting: echo=FALSE,results="asis",warning=FALSE,message=FALSE
  #| packages: ggplot2, dplyr, activity
  
  if (!requireNamespace("activity", quietly = TRUE)) {
    
    cat("\n\nThe activity package is not installed; activity patterns cannot be estimated.\n")
    
  } else if (!is.null(object$sun_times) && nrow(object$sun_times) > 0) {
    
    frequent_species_scientific <- object$get_speciesNames(object$setting$focus_groups)
    frequent_species_scientific <- unique(frequent_species_scientific)
    frequent_species_scientific <- frequent_species_scientific[!is.na(frequent_species_scientific)]
    
    # Color palette
    species_colors <- setNames(
      rep(object$reportObjectElements$color_palette, length.out = length(frequent_species_scientific)),
      frequent_species_scientific
    )
    
    # Compute total average sunrise/sunset
    overall_sunrise <- mean(object$sun_times$avg_sunrise, na.rm = TRUE)
    overall_sunset  <- mean(object$sun_times$avg_sunset,  na.rm = TRUE)
    
    # Helper: create activity model directly from timestamps
    .fit_activity_direct <- function(object, species, reps = 10, min_records = 20) {
      
      dat <- object$data$observations
      
      if (is.null(dat) || !is.data.frame(dat) || nrow(dat) == 0) {
        stop("no observation data are available")
      }
      
      if (!all(c("scientificName", "timestamp") %in% names(dat))) {
        stop("scientificName or timestamp column is missing")
      }
      
      dat_sp <- dat |>
        dplyr::filter(
          !is.na(scientificName),
          scientificName == species,
          !is.na(timestamp)
        )
      
      if (nrow(dat_sp) == 0) {
        stop("no timestamped detections are available")
      }
      
      # Use one record per independent event where possible.
      # This avoids problems caused by count values and prevents over-weighting burst records.
      if ("sequenceID" %in% names(dat_sp) && any(!is.na(dat_sp$sequenceID))) {
        dat_sp <- dat_sp |>
          dplyr::filter(!is.na(sequenceID)) |>
          dplyr::distinct(sequenceID, .keep_all = TRUE)
      } else if ("observationID" %in% names(dat_sp) && any(!is.na(dat_sp$observationID))) {
        dat_sp <- dat_sp |>
          dplyr::filter(!is.na(observationID)) |>
          dplyr::distinct(observationID, .keep_all = TRUE)
      } else if ("deploymentID" %in% names(dat_sp)) {
        dat_sp <- dat_sp |>
          dplyr::distinct(deploymentID, timestamp, .keep_all = TRUE)
      } else {
        dat_sp <- dat_sp |>
          dplyr::distinct(timestamp, .keep_all = TRUE)
      }
      
      if (!inherits(dat_sp$timestamp, "POSIXct")) {
        tz_use <- "UTC"
        if (!is.null(object$setting$tz) && length(object$setting$tz) > 0 &&
            !is.na(object$setting$tz[1]) && nzchar(object$setting$tz[1])) {
          tz_use <- object$setting$tz[1]
        }
        dat_sp$timestamp <- as.POSIXct(dat_sp$timestamp, tz = tz_use)
      }
      
      dat_sp <- dat_sp[!is.na(dat_sp$timestamp), , drop = FALSE]
      
      # Convert clock time to radians, as required by activity::fitact()
      tt <- as.POSIXlt(dat_sp$timestamp)
      time_decimal <- tt$hour + tt$min / 60 + tt$sec / 3600
      time_rad <- (time_decimal / 24) * 2 * pi
      time_rad <- time_rad[is.finite(time_rad)]
      
      if (length(time_rad) < min_records) {
        stop(paste0("too few independent detections; n = ", length(time_rad)))
      }
      
      if (length(unique(round(time_rad, 6))) < 5) {
        stop("too few unique detection times")
      }
      
      activity::fitact(
        dat = time_rad,
        sample = "data",
        reps = reps,
        show = FALSE
      )
    }
    
    # Loop through species
    for (species in frequent_species_scientific) {
      
      cat("\n###", species, "{.unnumbered}\n\n")
      
      activity_model <- tryCatch(
        .fit_activity_direct(object, species = species, reps = 10, min_records = 20),
        error = function(e) e
      )
      
      if (inherits(activity_model, "error")) {
        
        cat(
          "\nActivity pattern could not be estimated for **",
          species,
          "**. Reason: ",
          activity_model$message,
          "\n\n",
          sep = ""
        )
        
      } else {
        
        pdf_obj <- activity_model@pdf
        
        # activity::fitact usually returns columns x, y, se, lcl, ucl.
        # This fallback also works if column names are missing.
        if (is.null(colnames(pdf_obj))) {
          colnames(pdf_obj) <- c("x", "y", "se", "lcl", "ucl")[seq_len(ncol(pdf_obj))]
        }
        
        activity_pred <- data.frame(
          time = (pdf_obj[, "x"] / (2 * pi)) * 24,
          estimate = pdf_obj[, "y"],
          lcl = if ("lcl" %in% colnames(pdf_obj)) pdf_obj[, "lcl"] else NA_real_,
          ucl = if ("ucl" %in% colnames(pdf_obj)) pdf_obj[, "ucl"] else NA_real_
        )
        
        activity_pred <- activity_pred[order(activity_pred$time), ]
        
        p <- ggplot(activity_pred, aes(x = time, y = estimate)) +
          geom_line(color = species_colors[[species]], linewidth = 1.2)
        
        if (any(is.finite(activity_pred$lcl)) && any(is.finite(activity_pred$ucl))) {
          p <- p +
            geom_ribbon(
              aes(ymin = lcl, ymax = ucl),
              fill = species_colors[[species]],
              alpha = 0.3
            )
        }
        
        p <- p +
          geom_vline(xintercept = overall_sunrise, color = "gold", linetype = "dashed", linewidth = 0.8) +
          geom_vline(xintercept = overall_sunset, color = "gray", linetype = "dashed", linewidth = 0.8) +
          scale_x_continuous(
            limits = c(0, 24),
            breaks = seq(0, 24, by = 6),
            labels = c("00:00", "06:00", "12:00", "18:00", "24:00")
          ) +
          labs(
            x = "Time of Day",
            y = "Estimated Activity Density"
          ) +
          theme_minimal(base_family = "", base_size = 13) +
          theme(
            axis.title.x = element_text(face = "bold", color = "black"),
            axis.title.y = element_text(face = "bold", color = "black"),
            axis.text.x = element_text(size = 12),
            axis.text.y = element_text(size = 12),
            legend.position = "none",
            panel.grid.minor = element_blank(),
            plot.margin = ggplot2::margin(20, 40, 20, 40)
          )
        
        print(p)
        
        cat(paste0(
          "\n\n", object$getFigureNumber(),
          " *Estimated daily activity pattern for ",
          species,
          ", aggregated across all sampling rounds. Dashed lines indicate the average sunrise (yellow) and sunset (gray) times across survey years. The solid line shows the fitted activity model"
        ))
        
        if (any(is.finite(activity_pred$lcl)) && any(is.finite(activity_pred$ucl))) {
          cat(", and the shaded region shows the 95% CI")
        }
        
        cat(".*\n\n")
      }
    }
    
  } else {
    cat('\n\nThe sun times have not been calculated; it requires the suncalc package. Please run setup first.\n')
  }
---