---
name: "population_densities"
title: "### Population Density Estimates {.tabset}"
parent: "population_density"
text: "The plots below show annual population density estimates for each study species, together with 95% confidence intervals. These estimates allow comparison of temporal variation in density across survey years.\n\n"
code: |
  #| name: pop_densities
  #| setting: echo=FALSE,results="asis",warning=FALSE,message=FALSE
  #| packages: ggplot2, dplyr
  
  if (!exists("estimates_rem") || is.null(estimates_rem)) {
    
    spn <- object$get_speciesNames(object$setting$focus_groups)
    spn <- unique(spn[!is.na(spn) & nzchar(spn)])
    
    rem_list <- list()
    
    if (length(spn) > 0) {
      for (sp in spn) {
        tmp <- try(object$get_REM(sp), silent = TRUE)
        
        if (!inherits(tmp, "try-error") && !is.null(tmp) && length(tmp) > 0) {
          tmp_df <- try(dplyr::bind_rows(tmp), silent = TRUE)
          
          if (!inherits(tmp_df, "try-error") && is.data.frame(tmp_df) && nrow(tmp_df) > 0) {
            rem_list[[sp]] <- tmp_df
          }
        }
      }
    }
    
    estimates_rem <- dplyr::bind_rows(rem_list)
  }
  
  if (exists("estimates_rem") && !is.null(estimates_rem) && nrow(estimates_rem) > 0) {
    
    density_data <- estimates_rem |>
      dplyr::filter(.data$Metric == "density") |>
      dplyr::filter(!is.na(.data$scientificName)) |>
      dplyr::filter(!is.na(.data$Year)) |>
      dplyr::filter(as.character(.data$Year) != "9999") |>
      dplyr::mutate(
        Year = suppressWarnings(as.numeric(as.character(.data$Year))),
        estimate = suppressWarnings(as.numeric(.data$estimate)),
        lcl95 = suppressWarnings(as.numeric(.data$lcl95)),
        ucl95 = suppressWarnings(as.numeric(.data$ucl95))
      ) |>
      dplyr::filter(
        is.finite(.data$Year),
        is.finite(.data$estimate)
      )
    
    if (nrow(density_data) > 0) {
      
      species_list <- unique(density_data$scientificName)
      
      species_colors <- stats::setNames(
        rep(object$reportObjectElements$color_palette, length.out = length(species_list)),
        species_list
      )
      
      for (i in seq_along(species_list)) {
        
        species <- species_list[i]
        
        cat(paste0("\n#### ", species, " {.unnumbered}\n\n"))
        
        species_data <- density_data |>
          dplyr::filter(.data$scientificName == species) |>
          dplyr::arrange(.data$Year)
        
        if (nrow(species_data) == 0) {
          cat("\nNo REM density estimates were available for this species.\n\n")
          next
        }
        
        species_color <- species_colors[[species]]
        
        finite_est <- species_data$estimate[is.finite(species_data$estimate)]
        finite_ucl <- species_data$ucl95[is.finite(species_data$ucl95)]
        
        max_est <- max(finite_est, na.rm = TRUE)
        max_ucl <- if (length(finite_ucl) > 0) {
          max(finite_ucl, na.rm = TRUE)
        } else {
          NA_real_
        }
        
        unstable_ci <- is.finite(max_ucl) &&
          is.finite(max_est) &&
          max_est > 0 &&
          max_ucl > 5 * max_est
        
        if (unstable_ci) {
          y_upper <- max_est * 1.6
        } else {
          y_upper <- max(c(species_data$estimate, species_data$ucl95), na.rm = TRUE) * 1.08
        }
        
        if (!is.finite(y_upper) || y_upper <= 0) {
          y_upper <- max(species_data$estimate, na.rm = TRUE) * 1.2
        }
        
        species_data <- species_data |>
          dplyr::mutate(
            lcl95_plot = dplyr::if_else(
              is.finite(.data$lcl95),
              pmax(.data$lcl95, 0),
              NA_real_
            ),
            ucl95_plot = dplyr::if_else(
              is.finite(.data$ucl95),
              pmin(.data$ucl95, y_upper),
              NA_real_
            ),
            ci_clipped = is.finite(.data$ucl95) & .data$ucl95 > y_upper
          )
        
        p <- ggplot2::ggplot(
          species_data,
          ggplot2::aes(
            x = factor(.data$Year),
            y = .data$estimate
          )
        ) +
          ggplot2::geom_col(
            fill = species_color,
            width = 0.6
          )
        
        if (any(is.finite(species_data$lcl95_plot)) && any(is.finite(species_data$ucl95_plot))) {
          p <- p +
            ggplot2::geom_errorbar(
              ggplot2::aes(
                ymin = .data$lcl95_plot,
                ymax = .data$ucl95_plot
              ),
              width = 0.18,
              color = "black",
              linewidth = 0.7,
              na.rm = TRUE
            )
        }
        
        if (any(species_data$ci_clipped, na.rm = TRUE)) {
          
          clipped_data <- species_data |>
            dplyr::filter(.data$ci_clipped)
          
          p <- p +
            ggplot2::geom_text(
              data = clipped_data,
              ggplot2::aes(
                x = factor(.data$Year),
                y = y_upper,
                label = "↑"
              ),
              inherit.aes = FALSE,
              size = 5,
              vjust = 1.1,
              color = "black"
            )
        }
        
        p <- p +
          ggplot2::coord_cartesian(
            ylim = c(0, y_upper),
            clip = "off"
          ) +
          ggplot2::labs(
            x = "Year",
            y = expression("Population density (km"^-2*")")
          ) +
          ggplot2::theme_minimal(base_size = 13) +
          ggplot2::theme(
            axis.text.x = ggplot2::element_text(angle = 45, hjust = 1),
            axis.title.x = ggplot2::element_text(face = "bold", color = "black"),
            axis.title.y = ggplot2::element_text(face = "bold", color = "black"),
            plot.title = ggplot2::element_text(face = "bold", size = 14),
            panel.grid.minor = ggplot2::element_blank()
          )
        
        print(p)
        
        if (unstable_ci) {
          cat(paste0(
            "\n\n*Note: The confidence intervals for **", species,
            "** are extremely wide relative to the point estimates. ",
            "The y-axis has been restricted for readability. Upward arrows indicate confidence intervals that extend beyond the displayed range. ",
            "This indicates high uncertainty in the REM estimate and should be interpreted cautiously.*\n"
          ))
        }
        
        cat(
          "\n\n",
          object$getFigureNumber(),
          " *Estimated population density per sampling year for ",
          species,
          ". Whiskers represent the 95% confidence intervals",
          if (unstable_ci) "; upward arrows indicate confidence intervals extending beyond the displayed y-axis range" else "",
          ".*\n\n",
          sep = ""
        )
      }
    }
  }
---
