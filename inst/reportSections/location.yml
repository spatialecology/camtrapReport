---
name: "location"
title: "## Camera Locations {.tabset}"
parent: "methods"
text: "The maps below display the locations of camera traps deployed during different years. Use the tabs above to explore data for each sampling year. The last tab shows the study area with all camera locations in this site. Locations are color-coded by habitat type. Click on the points for additional deployment information."
code1: |
  #| name: camera_locations_leaflet
  #| setting: echo = FALSE, results = 'asis', fig.show = "hold"
  #| packages: leaflet, dplyr, terra, htmltools
  
  # High-contrast categorical colours for habitat classes
  .nice_habitat_palette <- function(n) {
    base_cols <- c(
      "#0072B2", "#D55E00", "#009E73", "#CC79A7",
      "#E69F00", "#56B4E9", "#882255", "#117733",
      "#332288", "#AA4499", "#44AA99", "#999933",
      "#661100", "#6699CC", "#AA4466", "#DDCC77",
      "#88CCEE", "#000000"
    )
    
    if (n <= length(base_cols)) {
      base_cols[seq_len(n)]
    } else {
      grDevices::hcl.colors(n, palette = "Dark 3")
    }
  }
  
  # Clean popup values: removes leading/trailing commas, repeated commas, and empty values
  .popup_value <- function(x, missing = "No Data") {
    x <- as.character(x)
    x[is.na(x)] <- ""
    x <- gsub("^\\s*,+\\s*", "", x)
    x <- gsub("\\s*,+\\s*$", "", x)
    x <- gsub("\\s*,\\s*,+", ", ", x)
    x <- gsub("\\s+", " ", x)
    x <- trimws(x)
    ifelse(nzchar(x), htmltools::htmlEscape(x), missing)
  }
  
  # Function to plot camera locations with popups
  plot_locations <- function(data, color_palette, add_legend = object$setting$locationLegend, .all_habitat) {
    
    if (is.null(data) || nrow(data) == 0) {
      return(NULL)
    }
    
    habitat_colors <- leaflet::colorFactor(
      palette = color_palette,
      domain = .all_habitat,
      na.color = "#1C1C1C"
    )
    
    data <- data |>
      dplyr::mutate(
        popup_text = paste0(
          "<b>Location:</b> ", .popup_value(locationName, "N/A"), "<br>",
          "<b>Habitat Type:</b> ", .popup_value(Habitat_Type, "N/A"), "<br>",
          "<b>Bait Use:</b> ", .popup_value(BaitUse_List), "<br>",
          "<b>Camera Height:</b> ", .popup_value(cameraHeight), "<br>",
          "<b>Species Observed:</b> ", .popup_value(Species_List), "<br>",
          "<b>Capture Method:</b> ", .popup_value(CaptureMethod_List), "<br>",
          "<b>Number of Photos:</b> ", .popup_value(Total_Photos), "<br>",
          "<b>Classified By:</b> ", .popup_value(Classify_By_List), "<br>",
          "<b>Setup By:</b> ", .popup_value(Setup_By_List)
        )
      )
    
    map <- leaflet::leaflet(data, width = "100%", height = "400px") |>
      leaflet::addTiles()
    
    if (!is.null(object$study_area) && !is.null(object$study_area$path)) {
      object$study_area$object <- terra::readRDS(object$study_area$path)
      .tmpStudyArea <- terra::project(object$study_area$object, "epsg:4326")
      
      map <- map |>
        leaflet::addPolygons(
          data = .tmpStudyArea,
          fillColor = "transparent",
          fillOpacity = 0.3,
          color = "black",
          weight = 2
        )
    }
    
    map <- map |>
      leaflet::addCircleMarkers(
        lng = ~longitude,
        lat = ~latitude,
        radius = 6,
        color = ~habitat_colors(Habitat_Type),
        fillOpacity = 0.85,
        stroke = TRUE,
        weight = 1,
        popup = ~popup_text
      ) |>
      leaflet::fitBounds(
        lng1 = min(data$longitude, na.rm = TRUE),
        lat1 = min(data$latitude, na.rm = TRUE),
        lng2 = max(data$longitude, na.rm = TRUE),
        lat2 = max(data$latitude, na.rm = TRUE)
      )
    
    if (isTRUE(add_legend)) {
      map <- map |>
        leaflet::addLegend(
          position = "bottomright",
          pal = habitat_colors,
          values = .all_habitat,
          title = "Habitat Type",
          opacity = 1
        )
    }
    
    map
  }
  
  # Shared habitat domain for consistent colours across all tabs
  .all_habitat <- unique(object$data_merged$Habitat_Type)
  .all_habitat <- sort(.all_habitat[!is.na(.all_habitat) & .all_habitat != ""])
  .habitat_palette <- .nice_habitat_palette(length(.all_habitat))
  
  # Automatically create tabs for each year
  for (doyear in object$years) {
    cat(paste0("### ", doyear, " {.unnumbered}\n\n"))
    
    .dat_year <- object$data_merged[
      object$data_merged$Year == doyear,
      c(
        "locationName", "cameraHeight", "BaitUse_List", "Species_List",
        "CaptureMethod_List", "Total_Photos", "Classify_By_List",
        "Setup_By_List", "longitude", "latitude", "Year", "Habitat_Type"
      )
    ]
    
    .dat_year <- .dat_year[
      !is.na(.dat_year$longitude) &
        !is.na(.dat_year$latitude),
    ]
    
    if (nrow(.dat_year) > 0) {
      p <- plot_locations(
        data = .dat_year,
        color_palette = .habitat_palette,
        .all_habitat = .all_habitat
      )
      print(htmltools::tagList(p))
    } else {
      cat(paste0("⚠️ No location data available for ", doyear, ".\n"))
    }
    
    cat("\n\n")
  }

