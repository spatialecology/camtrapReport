        "<b>Classified By:</b> ", .popup_value(Classify_By_List), "<br>",
        "<b>Setup By:</b> ", .popup_value(Setup_By_List)
      )
    )
  
  map <- leaflet::leaflet(.dat_year, width = "100%", height = "400px") |>
    leaflet::addTiles()
  
  if (!is.null(object$study_area) && !is.null(object$study_area$path)) {
    object$study_area$object <- terra::readRDS(object$study_area$path)
    .tmpStudyArea <- terra::project(object$study_area$object, "epsg:4326")
    
    map <- map |>
      leaflet::addPolygons(
        data = .tmpStudyArea,
        fillColor = "transparent",
        fillOpacity = 0.3,
        color = "black",
        weight = 2
      )
  }
  
  map <- map |>
    leaflet::addCircleMarkers(
      lng = ~longitude,
      lat = ~latitude,
      radius = 6,
      color = ~habitat_colors(Habitat_Type),
      fillOpacity = 0.85,
      stroke = TRUE,
      weight = 1,
      popup = ~label
    ) |>
    leaflet::fitBounds(
      lng1 = min(.dat_year$longitude, na.rm = TRUE),
      lat1 = min(.dat_year$latitude, na.rm = TRUE),
      lng2 = max(.dat_year$longitude, na.rm = TRUE),
      lat2 = max(.dat_year$latitude, na.rm = TRUE)
    )
  
  if (isTRUE(object$setting$locationLegend)) {
    map <- map |>
      leaflet::addLegend(
        position = "bottomright",
        pal = habitat_colors,
        values = unique_habitats,
        title = "Habitat Type",
        opacity = 1
      )
  }
  
  map
  
  cat("\n\n")
  cat("##  {.unnumbered}\n")
  cat(object$getFigureNumber(), "*Interactive map of camera trap locations. Click on a marker to view the corresponding location details and additional metadata.*\n")
