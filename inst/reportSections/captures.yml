---
name: "captures"
title: "## Captures"
parent: "results"
text: null
code: |
  #| name: focus_text
  #| setting: echo=FALSE,results="asis",warning=FALSE
  #| packages: dplyr, gt
  
  years_vector <- sort(object$years)
  year_text <- .paste_comma_and(years_vector)

  wild_n <- nrow(object$species_summary$wild_animals$site_list)
  domestic_n <- nrow(object$species_summary$domestic$site_list)
  total_human <- sum(object$species_summary$human_observation$per_year$total_observations, na.rm = TRUE)

  focus_label <- .pretty_label(object$setting$focus_groups)

  # ---------------------------
  # paragraph 1 (overview)
  # ---------------------------
  cat(paste0(
    "This section presents an overview of the camera-trap capture data collected during the study period. ",
    "Across ", year_text, ", the survey recorded ", wild_n, " wild species and ",
    domestic_n, " domestic species."
  ))

  if (!is.na(total_human) && total_human > 0) {
    cat(paste0(
      " Human presence was also detected on ", total_human,
      " occasions, most likely associated with field visits for camera installation or maintenance."
    ),"\n\n")
  }
  #---------------
  # paragraph2:
  #---------------
  cat(paste0(
  "The report focuses on **", focus_label, "** ",
  "recorded in at least **", object$filterCount, "** capture events during the study period. ",
  "The following table summarizes these frequently detected species and provides the main capture-based metrics for each species, ",
  "including capture events, Relative Abundance Index (RAI; captures per 100 trap-days), number of capture locations, and total photos."
  ),"\n")
  
  # ---- Identify focal species --------------------------------------------
  
  if (!is.null(object$setting$focus_groups)) {
    .idx <- which(names(object$species_summary) %in% object$setting$focus_groups)
    .focus_scientific <- unique(unlist(lapply(.idx, function(i) {
      object$species_summary[[i]]$site_list$scientificName
    })))
  } else {
    .default_groups <- c("wild_mammals", "large_mammals", "birds", "amphibians", "reptiles")
    .idx <- which(names(object$species_summary) %in% .default_groups)
    .focus_scientific <- unique(unlist(lapply(.idx, function(i) {
      object$species_summary[[i]]$site_list$scientificName
    })))
  }
  
  # ---- Use object$capture as the source of truth --------------------------
  
  capture_total <- object$capture |>
    dplyr::filter(
      Year == "total",
      scientificName %in% .focus_scientific,
      !is.na(scientificName),
      Captures >= object$filterCount
    ) |>
    dplyr::mutate(
      Species_Name = dplyr::if_else(
        is.na(Species_Name) | Species_Name == "",
        scientificName,
        Species_Name
      )
    )
  
  # Optional auxiliary photo total, kept separate from "captures"
  obs_merged <- .merge_data(object$data, dropMedia = TRUE)
  
  photo_summary <- obs_merged |>
    dplyr::filter(
      scientificName %in% capture_total$scientificName,
      observationType == "animal"
    ) |>
    dplyr::mutate(
      photo_key = dplyr::coalesce(
        as.character(sequenceID),
        as.character(observationID)
      )
    ) |>
    dplyr::distinct(scientificName, photo_key, nrphotos) |>
    dplyr::group_by(scientificName) |>
    dplyr::summarise(
      Total_Photos = sum(nrphotos, na.rm = TRUE),
      .groups = "drop"
    )
  
  group_summary <- capture_total |>
    dplyr::left_join(photo_summary, by = "scientificName") |>
    dplyr::mutate(
      Total_Photos = dplyr::coalesce(Total_Photos, 0),
      Species_Label = dplyr::if_else(
        Species_Name == scientificName,
        scientificName,
        paste0(Species_Name, " (", scientificName, ")")
      )
    ) |>
    dplyr::arrange(dplyr::desc(Captures), Species_Name)
  
  emoji <- if (!is.null(object$setting$focus_groups) && "large_mammals" %in% object$setting$focus_groups) {
    "🦌"
  } else if (!is.null(object$setting$focus_groups) && "birds" %in% object$setting$focus_groups) {
    "🕊️"
  } else {
    "🐾"
  }
  
  group_labels <- if (!is.null(object$setting$focus_groups)) {
    .paste_comma_and(
      object$species_summary$count$Name[
        object$species_summary$count$Group %in% object$setting$focus_groups
      ]
    )
  } else {
    "focal species"
  }
  
  if (nrow(group_summary) == 0) {
    cat("\nNo species met the threshold of ", object$filterCount, " capture events.\n")
  } else {
    group_summary |>
      dplyr::transmute(
        `Common Name` = Species_Name,
        `Scientific Name` = scientificName,
        `Captures` = Captures,
        `RAI` = RAI,
        `Capture Locations` = Locations,
        `Total Photos` = Total_Photos
      ) |>
      gt::gt() |>
      gt::tab_header(
        title = gt::md(
          paste0(
            "**", emoji, " Table ", object$getTableNumber(text = FALSE),
            ". Summary of Frequently Detected ", group_labels, "**"
          )
        ),
        subtitle = gt::md(
          paste0("Species with ≥ ", object$filterCount, " capture events")
        )
      ) |>
      gt::fmt_number(
        columns = c(`RAI (per 100 trap-days)`),
        decimals = 2
      ) |>
      gt::tab_options(
        table.font.size = gt::px(14),
        heading.title.font.size = gt::px(16),
        heading.subtitle.font.size = gt::px(12)
      ) |>
      gt::opt_row_striping()
  }
  
