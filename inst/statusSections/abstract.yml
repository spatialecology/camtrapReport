text: |
  This report provides an overview of the camera trap dataset and the preprocessing steps used for automated report generation. It enables users to quickly assess the quality of their data through a concise summary generated by a series of automated checks. The report is structured into four main chapters: Setup, Annotation, and Validation, each offering a detailed assessment of your dataset's integrity and readiness. At the conclusion of the report, you will receive an overall data quality classification, which will be one of the following:

  -   [Perfect]{{style="color: ForestGreen; font-weight: bold;"}}: All key checks passed; no issues detected.\
  
  -   [Acceptable]{{style="color: Orange; font-weight: bold;"}}: Minor issues found; the dataset remains usable, although corrections are recommended.\
  
  -   [Needs Improvement]{{style="color: Red; font-weight: bold;"}}: Major issues identified; corrections are mandatory before continuing.

  If the status is Perfect or Acceptable, you may proceed with generating the final report. However, if the status is Needs Improvement, report generation is not possible due to major issues identified in the data set and user must improve data set.
  
  *Note*: To ensure the highest quality automated report generation from your camera trap data, we strongly recommend improving your dataset whenever possible. If the status is Acceptable, consider refining it to reach the ideal Perfect level, this may require only minor adjustments, but it can make a significant difference in the final report. If the status is Needs Improvement, we advise resolving the identified issues to bring the dataset to at least the Acceptable level, and ideally to the Perfect standard.
  
  
  
