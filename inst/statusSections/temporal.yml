---
name: "temporal"
title: "## Temporal Data {.unnumbered}"
parent: null
text: |
  This section summarizes the temporal patterns of the camera-trap dataset, including coverage over time, potential gaps, and any detected anomalies or outliers, which are presented in Table 2.
  
code: |
  #| name: code
  #| setting: echo=FALSE,results="asis",message=FALSE, warning=FALSE
  #| packages: base
  
  temporal_data <- object$data_status$Temporal
  
  mint_pastel <- c("#eafaf1", "#f3fcf7", "#e1f7ec")

  cat("
  <div style='text-align:center; margin:0 auto;'>
  <table style='
    margin:auto;
    border-collapse:collapse;
    table-layout:fixed;
    width:900px;
    font-family:Arial, sans-serif;
    font-size:13px;'>
  <thead>
    <tr style='background-color:#f2f2f2; font-weight:bold;'>
      <th style='border:1px solid #ccc; padding:6px; width:45%;'>Metric</th>
      <th style='border:1px solid #ccc; padding:6px; width:55%;'>Result</th>
    </tr>
  </thead>
  <tbody>
  ")
  
  for (i in seq_len(nrow(temporal_data))) {
    bg_color <- mint_pastel[(i - 1) %% length(mint_pastel) + 1]
  
    # Use the correct column name ("Result"); fall back to "Details" if needed
    res_val <- if ("Result" %in% names(temporal_data)) temporal_data$Result[i] else temporal_data$Details[i]
    res_val <- gsub("\n", "<br>", res_val)
  
    cat(sprintf(
      "<tr style='background-color:%s;'>
         <td style='border:1px solid #ddd; padding:6px; vertical-align:top;'>%s</td>
         <td style='border:1px solid #ddd; padding:6px; vertical-align:top; white-space:normal; word-break:break-word;'>%s</td>
       </tr>",
      bg_color, temporal_data$Metric[i], res_val
    ))
  }
  
  cat("</tbody></table></div>")

---