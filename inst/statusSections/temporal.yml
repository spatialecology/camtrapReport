---
name: "temporal"
title: "## Temporal Data {.unnumbered}"
parent: null
text: |
  This section summarizes the temporal patterns of the camera-trap dataset, including coverage over time, potential gaps, and any detected anomalies or outliers, which are presented in Table 2.
code: |
  #| name: code
  #| setting: echo=FALSE, results="asis", message=FALSE, warning=FALSE
  #| packages: base
  
  temporal_status <- object$data_status$Temporal
  
  out <- list()
  
  # -------------------------
  # Helper for month coverage
  # -------------------------
  
  .month_coverage_text <- function(x) {
    
    if (is.null(x) || nrow(x) == 0) {
      return("Not available")
    }
    
    x <- x[order(x$Year), ]
    
    out_lines <- c()
    
    for (i in seq_len(nrow(x))) {
      
      year_text <- paste0(x[i, 1], ": ")
      month_text <- as.character(x[i, 2])
      
      if (any(strsplit(month_text, "")[[1]] %in% c("–", "-"))) {
        line <- paste0(year_text, month_text)
      } else {
        line <- paste0(year_text, month_text, "–", month_text)
      }
      
      out_lines <- c(out_lines, line)
    }
    
    paste(out_lines, collapse = "<br>")
  }
  
  # -------------------------
  # Build temporal summary table
  # -------------------------
  
  out[["Deployment year coverage"]] <- temporal_status$dep_years_message
  out[["Observation year coverage"]] <- temporal_status$obs_years_message
  out[["Deployment first/last setup"]] <- temporal_status$dep_first_last_setup
  out[["Observation first/last record"]] <- temporal_status$obs_first_last
  out[["Temporal consistency"]] <- temporal_status$temporal_inconsistency
  out[["First/last date check"]] <- temporal_status$message_first_last
  out[["Month coverage span"]] <- .month_coverage_text(temporal_status$dep_month_coverage)
  out[["Calendar coverage"]] <- temporal_status$dep_calendar_coverage
  out[["Max gap between deployments"]] <- temporal_status$dep_max_gap
  out[["Min gap between deployments"]] <- temporal_status$dep_min_gap
  out[["Missing deployment intervals"]] <- temporal_status$dep_missing_intervals
  out[["Zero-length deployments"]] <- temporal_status$dep_zero_length
  out[["Temporal outliers"]] <- temporal_status$temporal_outliers
  out[["Invalid timestamp format"]] <- temporal_status$invalid_timestamp_format
  out[["Future observation timestamps"]] <- temporal_status$obs_future_timestamps
  
  temporal_data <- data.frame(
    Metric = names(out),
    Result = unname(as.character(sapply(out, function(x) x))),
    stringsAsFactors = FALSE
  )
  
  temporal_data$Metric <- gsub("\n", "<br>", temporal_data$Metric)
  temporal_data$Result <- gsub("\n", "<br>", temporal_data$Result)
  
  # -------------------------
  # Render table
  # -------------------------
  
  mint_pastel <- c("#eafaf1", "#f3fcf7", "#e1f7ec")
  
  .table_caption <- function(number, text) {
    cat(paste0(
      "<div style='font-size:15px; color:#24384a; margin-bottom:8px; text-align:center;'>",
      "<strong><em>Table ", number, ".</em></strong> ",
      text,
      "</div>"
    ))
  }
  
  cat("
  <div style='max-width:900px; margin:12px auto 24px auto; text-align:center;'>
  ")
  
  .table_caption(
    number = 2,
    text = "Temporal coverage summary"
  )
  
  cat("
  <table style='
    margin:auto;
    border-collapse:collapse;
    table-layout:fixed;
    width:100%;
    font-family:Arial, sans-serif;
    font-size:12px;
    line-height:1.35;'>
  <thead>
    <tr style='background-color:#f2f2f2; font-weight:bold;'>
      <th style='border:1px solid #ccc; padding:6px; width:38%; text-align:center;'>Metric</th>
      <th style='border:1px solid #ccc; padding:6px; width:62%; text-align:center;'>Result</th>
    </tr>
  </thead>
  <tbody>
  ")
  
  for (i in seq_len(nrow(temporal_data))) {
    
    bg_color <- mint_pastel[(i - 1) %% length(mint_pastel) + 1]
    
    metric_val <- temporal_data$Metric[i]
    metric_val <- ifelse(is.na(metric_val), "", metric_val)
    
    res_val <- temporal_data$Result[i]
    res_val <- ifelse(is.na(res_val), "", res_val)
    
    cat(sprintf(
      "<tr style='background-color:%s;'>
         <td style='border:1px solid #ddd; padding:6px; vertical-align:top; text-align:center; word-break:break-word;'>%s</td>
         <td style='border:1px solid #ddd; padding:6px; vertical-align:top; text-align:center; white-space:normal; word-break:break-word;'>%s</td>
       </tr>",
      bg_color, metric_val, res_val
    ))
  }
  
  cat("
  </tbody>
  </table>
  </div>
  ")
---