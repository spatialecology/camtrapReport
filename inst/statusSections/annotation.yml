name: "annotation"
title: "## Chapter 5: Annotation {.unnumbered}"
parent: null
text: |
  
  In this chapter, we provide an overview of annotation confidence in the camera-trap observations. The summary distinguishes between machine-generated and human-generated classifications and highlights the variation in confidence scores across annotation methods. This section helps assess annotation reliability, identify records below selected confidence thresholds, and evaluate whether additional quality control or review may be needed before ecological reporting.

code: |
  #| name: annotation_confidence_table
  #| setting: echo=FALSE, results="asis", message=FALSE, warning=FALSE
  #| packages: base
  
  machine_confidence <- object$data_status$Annotation$Machine_Summary
  human_confidence   <- object$data_status$Annotation$Human_Summary
  
  machine_confidence$Statistic <- c(
    "Minimum Confidence Score",
    "Maximum Confidence Score",
    "Mean Confidence Score",
    "Below Threshold (<0.8)",
    "Total Annotations"
  )
  
  human_confidence$Statistic <- c(
    "Minimum Confidence Score",
    "Maximum Confidence Score",
    "Mean Confidence Score",
    "Below Threshold (<1)",
    "Total Annotations"
  )
  
  # -------------------------
  # Helper functions
  # -------------------------
  
  escape_html <- function(x) {
    x <- as.character(x)
    x[is.na(x)] <- ""
    x <- gsub("&", "&amp;", x, fixed = TRUE)
    x <- gsub("<", "&lt;",  x, fixed = TRUE)
    x <- gsub(">", "&gt;",  x, fixed = TRUE)
    x <- gsub("\"", "&quot;", x, fixed = TRUE)
    x
  }
  
  format_value <- function(stat, value) {
    
    value_num <- suppressWarnings(as.numeric(value))
    
    if (!is.na(value_num) && grepl("confidence score", stat, ignore.case = TRUE)) {
      return(formatC(value_num, format = "f", digits = 2))
    }
    
    if (!is.na(value_num) && abs(value_num - round(value_num)) < 1e-9) {
      return(format(round(value_num), trim = TRUE, scientific = FALSE))
    }
    
    if (!is.na(value_num)) {
      return(format(value_num, trim = TRUE, scientific = FALSE))
    }
    
    as.character(value)
  }
  
  .table_caption <- function(number, text, width = "900px") {
    cat(paste0(
      "\n<div style='max-width:", width, "; margin:14px auto 8px auto; ",
      "text-align:center; font-size:15px; color:#24384a; line-height:1.35;'>",
      "<strong><em>Table ", number, ".</em></strong> ",
      text,
      "</div>\n"
    ))
  }
  
  make_table_html <- function(df, title, header_bg) {
    
    rows <- vapply(seq_len(nrow(df)), function(i) {
      
      row_bg <- if (i %% 2 == 1) "#f9f9f9" else "#ffffff"
      
      stat  <- escape_html(as.character(df$Statistic[i]))
      value <- escape_html(format_value(df$Statistic[i], df$Value[i]))
      
      paste0(
        '<tr style="background:', row_bg, ';">',
        '<td style="padding:7px 10px; border:1px solid #ddd; text-align:left;">', stat, '</td>',
        '<td style="padding:7px 10px; border:1px solid #ddd; text-align:right;">', value, '</td>',
        '</tr>'
      )
    }, character(1))
    
    paste0(
      '<div style="width:48%;">',
        '<h4 style="text-align:center; margin:0 0 8px 0; font-size:15px; color:#24384a;">',
          escape_html(title),
        '</h4>',
        '<table style="width:100%; border-collapse:collapse; font-family:Arial, sans-serif; font-size:13px; line-height:1.35;">',
          '<thead>',
            '<tr style="background:', header_bg, '; font-weight:bold;">',
              '<th style="padding:7px 10px; border:1px solid #ddd; text-align:left;">Statistic</th>',
              '<th style="padding:7px 10px; border:1px solid #ddd; text-align:right;">Value</th>',
            '</tr>',
          '</thead>',
          '<tbody>',
            paste(rows, collapse = ""),
          '</tbody>',
        '</table>',
      '</div>'
    )
  }
  
  # -------------------------
  # Render caption above table
  # -------------------------
  
  .table_caption(
    number = 5,
    text = "Summary of machine and human annotation confidence scores",
    width = "900px"
  )
  
  html_out <- paste0(
    '<div style="max-width:900px; margin:8px auto 26px auto; text-align:center;">',
      '<div style="display:flex; justify-content:space-between; gap:20px; align-items:flex-start;">',
        make_table_html(
          machine_confidence,
          "Machine Classification Confidence",
          "#d9edf7"
        ),
        make_table_html(
          human_confidence,
          "Human Classification Confidence",
          "#f7e1d9"
        ),
      '</div>',
    '</div>'
  )
  
  cat(html_out)
