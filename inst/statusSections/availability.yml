name: "availability"
title: "## Chapter 2: Data Availability {.unnumbered}"
parent: null
text: |
  
  ### Review Essential Data Availability {{.unnumbered}}
  
  In this chapter, we review all essential data components required for generating the report. These include both mandatory fields and necessary supporting fields or files that contribute to the completeness and overall quality of the final output. Table 3 provides a structured overview of the availability and completeness of these elements. While all fields listed in the table are important for generating a high-quality report, the **bolded** fields are mandatory. Their status must be marked as **Complete**; otherwise, any associated records with missing or partial values will be automatically excluded from the final output.
  
code: |
  #| name: code
  #| setting: echo=FALSE,results="asis",message=FALSE, warning=FALSE
  #| packages: base
  
  x <- object$data_status$Essentials
  c1 <- rep("Locations",length(x$loc))
  c2 <- c("locationID","locationName","longitude","latitude")
  c3 <- unlist(x$loc)
  #======
  .w <- x$dep[c("dep_interval","habitat","setupBy_status","baitUse","cameraHeight")]
  names(.w) <- c("deployment_interval","habitat","setupBy","baitUse","cameraHeight")
  c1 <- c(c1,rep("Deployment",length(.w)))
  c2 <- c(c2,names(.w))
  c3 <- c(c3,unlist(.w))
  #----
  .w <- x$obs[c("timestamp","classifiedBy_status")]
  names(.w) <- c("timestamps","classifiedBy")
  c1 <- c(c1,rep("Observations",length(.w)))
  c2 <- c(c2,names(.w))
  c3 <- c(c3,unlist(.w))
  #--------
  .w <- x$seq[c("nrphotos","captureMethod")]
  #names(.w) <- c("timestamps","classifiedBy")
  c1 <- c(c1,rep("Sequences",length(.w)))
  c2 <- c(c2,names(.w))
  c3 <- c(c3,unlist(.w))
  #------
  .w <- x$tax[c("scientificName","nld","eng")]
  names(.w) <- c("scientificName","vernacularNames.nld","vernacularNames.eng")
  c1 <- c(c1,rep("Taxonomy",length(.w)))
  c2 <- c(c2,names(.w))
  c3 <- c(c3,unlist(.w))
  #------
  c1 <- c(c1,c("Additional Files","Additional Files"))
  c2 <- c(c2,c("habitat.csv","spatial boundary (e.g., shapefile)"))
  if (nrow(object$habitat) == 0) {
    .w <- c("🔴 Missing")
  } else .w <- "🟢 Complete"
  
  if (is.null(object$study_area)) {
    .w <- c(.w,"🔴 Missing")
  } else .w <- c(.w,"🟢 Complete")
  
  c3 <- c(c3,.w)
  data_summary <- data.frame(Category=c1,Field=c2,Status=c3)


  
  # Fields to highlight in bold
  bold_fields <- c("deployment_interval", "locationID", "locationName", 
                   "longitude", "latitude", "timestamps", 
                   "scientificName", "vernacularNames.eng")
  
  # Container
  cat("<div style='overflow-x: auto; display: flex; justify-content: center; margin: 20px auto;'>")
  
  # Pastel color setup
  pastel_colors <- c("#f0f4f8", "#f7f9fc", "#eef2f6")
  
  # Table start
  cat("<table style='border-collapse: collapse; max-width: 800px; font-family: Arial, sans-serif; font-size: 11px;'>")
  cat("<thead><tr style='background-color: #f2f2f2; font-weight: bold;'>")
  cat("<th style='border: 1px solid #ccc; padding: 4px; max-width: 120px;'>Category</th>")
  cat("<th style='border: 1px solid #ccc; padding: 4px; max-width: 160px;'>Field</th>")
  cat("<th style='border: 1px solid #ccc; padding: 4px; max-width: 200px;'>Status</th>")
  cat("</tr></thead><tbody>")
  
  # Setup for merged Category cells
  row_spans <- rle(data_summary$Category)
  start_indices <- cumsum(c(1, head(row_spans$lengths, -1)))
  current_group <- 1
  
  # Loop for table rows
  for (i in seq_len(nrow(data_summary))) {
    if (i %in% start_indices) current_group <- which(start_indices == i)
    bg_color <- pastel_colors[(current_group - 1) %% length(pastel_colors) + 1]
    
    cat(sprintf("<tr style='background-color: %s;'>", bg_color))
    
    # Render category cell only once per group
    if (i %in% start_indices) {
      rowspan <- row_spans$lengths[which(start_indices == i)]
      cat(sprintf("<td style='border: 1px solid #ddd; padding: 4px;' rowspan='%d'>%s</td>", 
                  rowspan, data_summary$Category[i]))
    }
    
    # Apply bold if in list
    field_val <- data_summary$Field[i]
    field_html <- if (field_val %in% bold_fields) {
      sprintf("<strong>%s</strong>", field_val)
    } else {
      field_val
    }
    
    cat(sprintf("<td style='border: 1px solid #ddd; padding: 4px;'>%s</td>", field_html))
    cat(sprintf("<td style='border: 1px solid #ddd; padding: 4px; color: black;'>%s</td>", data_summary$Status[i]))
    
    cat("</tr>")
  }
  
  cat("</tbody></table>")
  cat("</div>")

