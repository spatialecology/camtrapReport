---
name: "species_records"
title: "## Chapter 3: Species Records {.unnumbered}"
parent: null
text: |
  
  This chapter summarizes the species detected in the camera-trap dataset. The table presents the taxonomic identity of each species and the number of event-level captures recorded for that species. Captures represent the number of unique event-level sequences in which each species was recorded. This summary helps verify the taxonomic content of the dataset and provides an overview of dominant and rare species before downstream ecological analyses.
  
code: |
  #| name: species_records_code
  #| setting: echo=FALSE, results="asis", message=FALSE, warning=FALSE
  #| packages: dplyr, DT
  
  species_table <- object$data_status$Species$Table
  
  if (is.null(species_table) || nrow(species_table) == 0) {
    
    cat("\n\nNo species-level records were available in the dataset.\n\n")
    
  } else {
    
    # Make a clean copy
    species_table <- as.data.frame(species_table, stringsAsFactors = FALSE)
    
    # If old columns still exist, clean them here
    if ("obs_records_count" %in% names(species_table)) {
      species_table$obs_records_count <- NULL
    }
    
    if ("n_sequences" %in% names(species_table)) {
      names(species_table)[names(species_table) == "n_sequences"] <- "captures"
    }
    
    # Keep only the final desired columns, if available
    final_cols <- c("scientificName", "family", "order", "class", "captures")
    final_cols <- final_cols[final_cols %in% names(species_table)]
    species_table <- species_table[, final_cols, drop = FALSE]
    
    # Convert captures to numeric for correct sorting
    if ("captures" %in% names(species_table)) {
      species_table$captures <- suppressWarnings(as.numeric(species_table$captures))
      species_table <- species_table |>
        dplyr::arrange(dplyr::desc(.data$captures))
    }
    
    # Summary values
    n_species <- object$data_status$Species$Keep_sp_n
    
    if (is.null(n_species) || is.na(n_species)) {
      n_species <- nrow(species_table)
    }
    
    top_species <- species_table$scientificName[seq_len(min(5, nrow(species_table)))]
    top_species_text <- paste(top_species, collapse = ", ")
    
    cat(paste0(
      "<p style='font-size:15px; line-height:1.5;'>",
      "A total of <strong>", n_species, "</strong> species were retained at species level after filtering. ",
      "The most frequently captured species were <strong>", top_species_text, "</strong>. ",
      "The interactive table below can be searched, sorted, and filtered by taxonomic group or capture frequency.",
      "</p>"
    ))
    
    # Centered caption
    cat("
    <div style='max-width:950px; margin:16px auto 10px auto; text-align:center;'>
      <div style='
        width:100%;
        text-align:center;
        font-size:15px;
        color:#24384a;
        margin:0 auto 10px auto;
        line-height:1.35;'>
        <strong><em>Table 4.</em></strong> Species records and event-level captures
      </div>
    </div>
    ")
    
    # Interactive table if DT is available
    if (requireNamespace("DT", quietly = TRUE)) {
      
      DT::datatable(
  species_table,
  rownames = FALSE,
  filter = "top",
  class = "stripe hover compact cell-border",
  options = list(
    pageLength = 15,
    lengthMenu = c(10, 15, 25, 50, 100),
    autoWidth = TRUE,
    scrollX = TRUE,
    order = list(list(which(names(species_table) == "captures") - 1, "desc")),
    dom = "lfrtip"
  ),
  colnames = c(
    scientificName = "Scientific name",
    family = "Family",
    order = "Order",
    class = "Class",
    captures = "Captures"
  )
  )
      
    } else {
      
      # Fallback static HTML table
      cat("
      <div style='max-width:950px; margin:10px auto 24px auto; text-align:center;'>
      <table style='
        margin:0 auto;
        border-collapse:collapse;
        table-layout:fixed;
        width:100%;
        font-family:Arial, sans-serif;
        font-size:13px;
        line-height:1.35;'>
      <thead>
        <tr style='background-color:#f2f2f2; font-weight:bold;'>
          <th style='border:1px solid #ccc; padding:6px;'>Scientific name</th>
          <th style='border:1px solid #ccc; padding:6px;'>Family</th>
          <th style='border:1px solid #ccc; padding:6px;'>Order</th>
          <th style='border:1px solid #ccc; padding:6px;'>Class</th>
          <th style='border:1px solid #ccc; padding:6px;'>Captures</th>
        </tr>
      </thead>
      <tbody>
      ")
      
      row_cols <- c("#f0f4f8", "#f7f9fc", "#eef2f6")
      
      for (i in seq_len(nrow(species_table))) {
        bg <- row_cols[(i - 1) %% length(row_cols) + 1]
        
        cat(sprintf(
          "<tr style='background-color:%s;'>
             <td style='border:1px solid #ddd; padding:6px; text-align:left;'><em>%s</em></td>
             <td style='border:1px solid #ddd; padding:6px; text-align:left;'>%s</td>
             <td style='border:1px solid #ddd; padding:6px; text-align:left;'>%s</td>
             <td style='border:1px solid #ddd; padding:6px; text-align:left;'>%s</td>
             <td style='border:1px solid #ddd; padding:6px; text-align:center;'>%s</td>
           </tr>",
          bg,
          species_table$scientificName[i],
          species_table$family[i],
          species_table$order[i],
          species_table$class[i],
          species_table$captures[i]
        ))
      }
      
      cat("
      </tbody>
      </table>
      </div>
      ")
    }
  }
