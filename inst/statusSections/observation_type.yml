---
name: "observation_type"
title: "## Chapter 6: Observation Types by Capture Method {{.tabset .unnumbered}}"
parent: null
text: |
  
  This figure summarizes observation types by capture method (Motion, TimeLapse) and overall. Each pie shows the within-method percentage of each observation type—animal, human, vehicle, blank, unknown, and unclassified; providing a quick view of what was observed and its relative weight in the dataset.
  
code: |
  #| name: code
  #| setting: echo=FALSE, results="asis", message=FALSE, warning=FALSE
  #| packages: ggplot2, dplyr
  
  observation_type_df <- object$data_status$Visuals$capt_method$Combined
  colnames(observation_type_df) <- c("Var1", "Freq", "CaptureMethod")
  
  .pie_caption <- function(number, text, width = "850px") {
    cat(paste0(
      "\n<div style='max-width:", width, "; margin:10px auto 24px auto; ",
      "text-align:center; font-size:15px; color:#24384a; line-height:1.35;'>",
      "<strong><em>Figure ", number, ".</em></strong> ",
      text,
      "</div>\n"
    ))
  }
  
  # -------------------------
  # Motion detection
  # -------------------------
  
  method <- "motionDetection"
  
  if (method %in% observation_type_df$CaptureMethod) {
    
    cat("\n\n## Motion {{.unnumbered}}\n\n")
    
    pie_data <- observation_type_df |>
      dplyr::filter(.data$CaptureMethod == method) |>
      dplyr::mutate(
        Percent = round(100 * .data$Freq / sum(.data$Freq, na.rm = TRUE), 1),
        Var1_label = paste0(.data$Var1, " (", .data$Percent, "%)"),
        Label = ifelse(.data$Percent < 3, "", .data$Var1_label),
        ypos = cumsum(.data$Freq) - 0.5 * .data$Freq
      )
    
    p <- ggplot2::ggplot(
      pie_data,
      ggplot2::aes(x = "", y = .data$Freq, fill = .data$Var1_label)
    ) +
      ggplot2::geom_col(width = 1, color = "white") +
      ggplot2::coord_polar(theta = "y") +
      ggplot2::geom_text(
        ggplot2::aes(label = .data$Label),
        position = ggplot2::position_stack(vjust = 0.5),
        size = 3
      ) +
      ggplot2::theme_void() +
      ggplot2::labs(
        title = "Observation Types - motionDetection",
        fill = "Observation Type"
      ) +
      ggplot2::scale_fill_brewer(palette = "Set3")
    
    print(p)
    
    .pie_caption(
      number = 2,
      text = "Distribution of observation types for motion-detection records. Slices show the percentage contribution of each observation type within this capture method."
    )
  }
  
  # -------------------------
  # TimeLapse
  # -------------------------
  
  method <- "timelapse"
  
  if (method %in% tolower(observation_type_df$CaptureMethod)) {
    
    cat("\n\n## TimeLapse {{.unnumbered}}\n\n")
    
    pie_data <- observation_type_df |>
      dplyr::filter(tolower(.data$CaptureMethod) == "timelapse") |>
      dplyr::group_by(.data$Var1) |>
      dplyr::summarise(Freq = sum(.data$Freq, na.rm = TRUE), .groups = "drop") |>
      dplyr::mutate(
        Percent = round(100 * .data$Freq / sum(.data$Freq, na.rm = TRUE), 1),
        Var1_label = paste0(.data$Var1, " (", .data$Percent, "%)"),
        Label = dplyr::if_else(
          .data$Percent < 3,
          "",
          .data$Var1_label,
          missing = .data$Var1_label
        )
      )
    
    p <- ggplot2::ggplot(
      pie_data,
      ggplot2::aes(x = "", y = .data$Freq, fill = .data$Var1_label)
    ) +
      ggplot2::geom_col(width = 1, color = "white") +
      ggplot2::coord_polar(theta = "y") +
      ggplot2::geom_text(
        ggplot2::aes(label = .data$Label),
        position = ggplot2::position_stack(vjust = 0.5),
        size = 3
      ) +
      ggplot2::theme_void() +
      ggplot2::labs(
        title = "Observation Types - timeLapse",
        fill = "Observation Type"
      ) +
      ggplot2::scale_fill_brewer(palette = "Set3", na.translate = FALSE)
    
    print(p)
    
    .pie_caption(
      number = 3,
      text = "Distribution of observation types for time-lapse records. Slices show the percentage contribution of each observation type within this capture method."
    )
  }
  
  # -------------------------
  # Total
  # -------------------------
  
  method <- "TOTAL"
  
  if (method %in% observation_type_df$CaptureMethod) {
    
    cat("\n\n## Total {{.unnumbered}}\n\n")
    
    pie_data <- observation_type_df |>
      dplyr::filter(.data$CaptureMethod == method) |>
      dplyr::mutate(
        Percent = round(100 * .data$Freq / sum(.data$Freq, na.rm = TRUE), 1),
        Var1_label = paste0(.data$Var1, " (", .data$Percent, "%)"),
        Label = ifelse(.data$Percent < 3, "", .data$Var1_label),
        ypos = cumsum(.data$Freq) - 0.5 * .data$Freq
      )
    
    p <- ggplot2::ggplot(
      pie_data,
      ggplot2::aes(x = "", y = .data$Freq, fill = .data$Var1_label)
    ) +
      ggplot2::geom_col(width = 1, color = "white") +
      ggplot2::coord_polar(theta = "y") +
      ggplot2::geom_text(
        ggplot2::aes(label = .data$Label),
        position = ggplot2::position_stack(vjust = 0.5),
        size = 3
      ) +
      ggplot2::theme_void() +
      ggplot2::labs(
        title = "Observation Types - TOTAL",
        fill = "Observation Type"
      ) +
      ggplot2::scale_fill_brewer(palette = "Set3")
    
    print(p)
    
    .pie_caption(
      number = 4,
      text = "Overall distribution of observation types across all capture methods. Slices show the percentage contribution of each observation type in the full dataset."
    )
  }
---
