---
name: "spatial"
title: "## Spatial Data {.unnumbered}"
parent: null
text: |
  This section summarizes the spatial quality of the camera-trap data extracted from the dataset files. It focuses specifically on location data, assessing issues such as missing values, duplicate entries, spatial outliers, and overall spatial structure. The complete results are presented in Table 1. If any issues are identified, we strongly recommend correcting the data before proceeding with report generation for your study site.
  
  Duplicate entries (by coordinates, LocationName, or LocationID) are collapsed to the first occurrence, and any rows with missing values in any column are excluded from the report-generation analysis unless you edit them. If any issues are identified in the table below, we strongly recommend correcting the data before proceeding with report generation for your study site.
  
  Note: If your dataset contains rows where the coordinates (longitude and latitude) are complete but either the LocationID or LocationName is missing, these records are still treated as missing. This is because, for spatial quality checks and analysis, both the geographic coordinates and their associated metadata (LocationID and LocationName) are equally important.
  
code: |
  #| name: camera_locations_leaflet
  #| setting: echo=FALSE, results="asis", message=FALSE, warning=FALSE
  #| packages: base
  
  ss <- object$data_status$Spatial
  
  # -------------------------
  # Helper functions
  # -------------------------
  
  .table_caption <- function(number, text, width = "850px") {
    cat(paste0(
      "\n<div style='max-width:", width, "; margin:14px auto 8px auto; ",
      "text-align:center; font-size:15px; color:#24384a;'>",
      "<strong><em>Table ", number, ".</em></strong> ",
      text,
      "</div>\n"
    ))
  }
  
  .clean_html <- function(x) {
    x <- as.character(x)
    x[is.na(x)] <- ""
    x <- gsub("\n", "<br>", x)
    x
  }
  
  # -------------------------
  # Build spatial summary table
  # -------------------------
  
  outlier_summary <- paste(
    paste("High risk outlier =", ss$num_highrisk_outliers),
    paste("Medium risk outlier =", ss$num_mediumrisk_outliers),
    paste("Low risk outlier =", ss$num_lowrisk_outliers),
    paste("Non-Terrestrial =", ss$num_sea_outliers),
    sep = "<br>"
  )
  
  spatial_table <- data.frame(
    Metric = c(
      "Number of locations",
      "Number of duplication in coordinates",
      "Number of duplication in LocationID",
      "Number of duplication in LocationName",
      "Missing data",
      "Total distinct coordinates",
      "Mean distance between locations (m)",
      "Max distance between locations (m)",
      "Min distance between locations (m)",
      "Spatial pattern",
      "Outliers"
    ),
    Result = c(
      ss$total_locationsrow,
      ss$num_duplicated_coordinate,
      ss$num_dup_locationID,
      ss$num_dup_locationName,
      ss$number_missing_rows,
      ss$total_unique_locations,
      ss$mean_distance_cam,
      ss$max_distance_cam,
      ss$min_distance_cam,
      ss$spatial_pattern,
      outlier_summary
    ),
    Status = c(
      "Before any filtering",
      ss$status_duplicated_coordinate,
      ss$status_dup_locationID,
      ss$status_dup_locationName,
      ss$message_missing,
      "After removing duplicates/missing values",
      "Mean inter-location distance",
      ss$max_distance_camNames,
      ss$min_distance_camNames,
      ss$status_spatial,
      ss$outliers_status
    ),
    stringsAsFactors = FALSE
  )
  
  spatial_table$Metric <- .clean_html(spatial_table$Metric)
  spatial_table$Result <- .clean_html(spatial_table$Result)
  spatial_table$Status <- .clean_html(spatial_table$Status)
  
  # -------------------------
  # Render table
  # -------------------------
  
  blue_pastel <- c("#e6f0fa", "#f0f7fd", "#dceeff")
  
  cat("<div style='max-width:850px; margin:14px auto 24px auto; text-align:center;'>")
  
  .table_caption(
    number = 1,
    text = "Spatial summary of camera-trap locations",
    width = "850px"
  )
  
  cat("
  <table style='
    margin:auto;
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    font-family:Arial, sans-serif;
    font-size:13px;
    line-height:1.35;'>
  <thead>
    <tr style='background-color:#f2f2f2; font-weight:bold;'>
      <th style='border:1px solid #ccc; padding:6px; width:25%; text-align:center;'>Metric</th>
      <th style='border:1px solid #ccc; padding:6px; width:28%; text-align:center;'>Result</th>
      <th style='border:1px solid #ccc; padding:6px; width:47%; text-align:center;'>Status</th>
    </tr>
  </thead>
  <tbody>
  ")
  
  for (i in seq_len(nrow(spatial_table))) {
    
    bg <- blue_pastel[(i - 1) %% length(blue_pastel) + 1]
    
    cat(sprintf("<tr style='background-color:%s;'>", bg))
    
    cat(sprintf(
      "<td style='border:1px solid #ddd; padding:6px; vertical-align:middle; text-align:center; word-break:break-word;'>%s</td>",
      spatial_table$Metric[i]
    ))
    
    cat(sprintf(
      "<td style='border:1px solid #ddd; padding:6px; vertical-align:middle; text-align:center; word-break:break-word;'>%s</td>",
      spatial_table$Result[i]
    ))
    
    cat(sprintf(
      "<td style='border:1px solid #ddd; padding:6px; vertical-align:middle; text-align:center; white-space:normal; word-break:break-word;'>%s</td>",
      spatial_table$Status[i]
    ))
    
    cat("</tr>")
  }
  
  cat("
  </tbody>
  </table>
  </div>
  ")
---
