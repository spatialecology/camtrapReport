url: https://spatialecology.github.io/camtrapReport/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#0B5D3B"
    secondary: "#1F7A4C"
    success: "#79B43A"
    info: "#2C7FB8"
