url: https://spatialecology.github.io/camtrapReport/
template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2F7D5C"
    secondary: "#6B7280"
    light: "#FFFFFF"
    dark: "#1F2937"

home:
  title: camtrapReport
  description: >
    An R package for processing camera-trap data and generating
    reproducible wildlife monitoring reports.
  sidebar:
    structure: [toc]

navbar:
  structure:
    left: [home, tutorials, reference, news]
    right: [search, report-bug, discussion, github]

  components:
    home:
      text: Get started
      href: index.html

    tutorials:
      text: Tutorials
      menu:
        - text: Package Overview
          href: articles/Package-Overview.html
        - text: Ecological Report
          href: articles/ecological-report.html
        - text: Data Status Report
          href: articles/data-status-report.html
        - text: Module Management
          href: articles/modules.html

    reference:
      text: Reference
      href: reference/index.html

    news:
      text: Changelog
      href: news/index.html

    report-bug:
      icon: fa-bug
      text: Report bug
      href: https://github.com/spatialecology/camtrapReport/issues/new/choose

    discussion:
      icon: fa-comments
      text: Discussion
      href: https://github.com/spatialecology/camtrapReport/discussions

    github:
      icon: fab fa-github
      text: GitHub
      href: https://github.com/spatialecology/camtrapReport
      aria-label: GitHub repository

articles:
  - title: Tutorials
    desc: >
      Step-by-step guides for using camtrapReport.
    contents:
      - Package-Overview
      - ecological-report
      - data-status-report
      - modules

reference:
  - title: Data input and setup
    contents:
      - camData
      - info

  - title: Core classes
    contents:
      - camReport-classes

  - title: Report generation
    contents:
      - report
      - updateReportSection

  - title: Report sections and modules
    contents:
      - reportSection
      - testSection
      - add_Module

---