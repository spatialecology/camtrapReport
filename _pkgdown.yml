url: https://spatialecology.github.io/camtrapReport/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2F7D5C"
    secondary: "#6B7280"
    light: "#FFFFFF"
    dark: "#1F2937"

home:
  title: camtrapReport
  description: >
    An R package for processing camera-trap data and generating
    reproducible wildlife monitoring reports.
  sidebar:
    structure: [toc]

navbar:
  structure:
    left: [home, example, article]
    right: [search, report-bug, discussion, github]

  components:
    home:
      text: Home
      href: index.html

    example:
      text: Example
      href: example.html

    article:
      text: Article
      href: Outputs.html

    report-bug:
      icon: fa-bug
      text: Report bug
      href: https://github.com/spatialecology/camtrapReport/issues/new/choose

    discussion:
      icon: fa-comments
      text: Discussion
      href: https://github.com/spatialecology/camtrapReport/discussions

    github:
      icon: fab fa-github
      text: GitHub
      href: https://github.com/spatialecology/camtrapReport
      aria-label: GitHub repository

reference:
  - title: Main functions
    contents:
      - camData
      - reportSection
      - testSection
      