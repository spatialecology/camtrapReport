url: https://spatialecology.github.io/camtrapReport/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: '#1F6F54'
    secondary: '#4B5563'
    light: '#F8FAF7'
    dark: '#1F2937'

home:
  title: camtrapReport
  description: >
    An R package for processing camera-trap data and generating
    reproducible wildlife monitoring reports.
  sidebar:
    structure: [toc]

navbar:
  structure:
    left: [home, articles, reference, changelog, resources]
    right: [search, report-bug, discussion, github]

  components:
    home:
      text: Get started
      href: index.html

    articles:
      text: Articles
      menu:
        - text: Package Overview
          href: articles/Package-Overview.html
        - text: Ecological Report
          href: articles/ecological-report.html
        - text: Data Status Report
          href: articles/data-status-report.html
        - text: How to add new modules?
          href: articles/modules.html

    reference:
      text: Reference
      href: reference/index.html

    changelog:
      text: Changelog
      href: news/index.html

    resources:
      text: Resources
      href: resources.html

    report-bug:
      icon: fa-bug
      text: Report bug
      href: https://github.com/spatialecology/camtrapReport/issues/new/choose

    discussion:
      icon: fa-comments
      text: Discussion
      href: https://github.com/spatialecology/camtrapReport/discussions

    github:
      icon: fab fa-github
      text: GitHub
      href: https://github.com/spatialecology/camtrapReport
      aria-label: GitHub repository

articles:
  - title: Articles
    desc: >
      Guides and documentation for using camtrapReport.
    contents:
      - Package-Overview
      - ecological-report
      - data-status-report
      - modules

reference:
  - title: Data input and setup
    contents:
      - camData
      - info
      - install_All
      - status

  - title: Core classes
    contents:
      - camReport-classes

  - title: Report generation
    contents:
      - report
      - updateReportSection

  - title: Report sections and modules
    contents:
      - reportSection
      - testSection
      - add_Module
      - listReportSections
      - section_names
      - list_Modules
      - move_Module
      - remove_Module
      - restore_Module

  - title: Utilities
    contents:
      - empty_trash
