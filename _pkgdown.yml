      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      menu:
        - text: Get started
          href: articles/get-started.html
    news:
      text: News
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/spatialecology/camtrapReport

reference:
  - title: Main functions
    contents:
      - camData
      - reportSection
      - install_All